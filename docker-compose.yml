services:
  node-0:
    build: .
    command:
      - server
      - -debug
      - -node-id=node-0
      - -addr=:8080
      - -advertise-host=node-0
      - -swim-addr=:7946
      - -swim-join-addr=:7947
      - -swim-seeds=node-1:7947,node-2:7947
    ports:
      - "8080:8080"
    develop:
      watch:
        - action: rebuild
          path: .

  node-1:
    build: .
    command:
      - server
      - -debug
      - -node-id=node-1
      - -addr=:8080
      - -advertise-host=node-1
      - -swim-addr=:7946
      - -swim-join-addr=:7947
      - -swim-seeds=node-0:7947,node-2:7947
    ports:
      - "8081:8080"
    develop:
      watch:
        - action: rebuild
          path: .

  node-2:
    build: .
    command:
      - server
      - -debug
      - -node-id=node-2
      - -addr=:8080
      - -advertise-host=node-2
      - -swim-addr=:7946
      - -swim-join-addr=:7947
      - -swim-seeds=node-0:7947,node-1:7947
    ports:
      - "8082:8080"
    develop:
      watch:
        - action: rebuild
          path: .

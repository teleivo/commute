services:
  node-0:
    build: .
    command:
      - server
      - -debug
      - -node-id=node-0
      - -addr=:8080
      - -advertise-addr=node-0:8080
      - -swim-addr=:7946
      - -swim-join-addr=:7947
      - -swim-seeds=node-1:7947,node-2:7947
    ports:
      - "8080:8080"
    develop:
      watch:
        - action: rebuild
          path: .

  node-1:
    build: .
    command:
      - server
      - -debug
      - -node-id=node-1
      - -addr=:8080
      - -advertise-addr=node-1:8080
      - -swim-addr=:7946
      - -swim-join-addr=:7947
      - -swim-seeds=node-0:7947,node-2:7947
    ports:
      - "8081:8080"
    develop:
      watch:
        - action: rebuild
          path: .

  node-2:
    build: .
    command:
      - server
      - -debug
      - -node-id=node-2
      - -addr=:8080
      - -advertise-addr=node-2:8080
      - -swim-addr=:7946
      - -swim-join-addr=:7947
      - -swim-seeds=node-0:7947,node-1:7947
    ports:
      - "8082:8080"
    develop:
      watch:
        - action: rebuild
          path: .

  load:
    build:
      context: .
      dockerfile: load/Dockerfile
    entrypoint: /bin/load-local.sh
    environment:
      COUNTER_KEY: gopher-vs-crab
      INCREMENT: "1"
      RATE: 24000/s
      REPORT_EVERY: 10s
    depends_on:
      - node-0
      - node-1
      - node-2
